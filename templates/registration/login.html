<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
</head>
<body>
    <h2>Login</h2>

    {% if form.errors %}
        <p style="color:red;">Username o password errati</p>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Accedi</button>
    </form>

    <p>Non hai un account? <a href="/registrazione/">Registrati</a></p>
</body>
</html>
